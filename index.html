<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Sistem Task Tracker Pendidikan</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }
        
        /* Glassmorphism styling */
        .glass-navbar {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Pulsing status indicator */
        .status-dot {
            position: relative;
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
        }
        .status-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            border-radius: 50%;
            animation: ripple 1.6s infinite ease-in-out;
            left: 0;
            top: 0;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* Iframe transitions */
        .iframe-container iframe {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        .iframe-container iframe.loaded {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col relative">
    
    <!-- Background Blurs -->
    <div class="fixed -top-40 -left-40 w-[500px] h-[500px] rounded-full bg-cyan-500/10 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed -bottom-40 -right-40 w-[500px] h-[500px] rounded-full bg-purple-500/10 blur-[120px] pointer-events-none z-0"></div>

    <!-- NAVBAR -->
    <header class="glass-navbar w-full py-4 px-6 md:px-10 flex items-center justify-between z-20 relative">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center text-white shadow-lg shadow-cyan-500/25">
                <i data-lucide="check-square" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-sm md:text-base font-extrabold tracking-tight text-white leading-none">PORTAL SMART TASK</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Task Tracker Pendidikan</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2.5 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/25">
            <span class="status-dot"></span>
            <span class="text-[10px] md:text-xs font-bold text-emerald-400 uppercase tracking-wider">Sistem Aktif</span>
        </div>
    </header>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 w-full p-4 md:p-6 z-10 relative flex flex-col">
        <div class="flex-1 w-full rounded-2xl md:rounded-3xl overflow-hidden glass-card shadow-2xl relative flex flex-col iframe-container">
            
            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-950/80 backdrop-blur-md flex flex-col items-center justify-center z-30 transition-all duration-500">
                <div class="relative flex items-center justify-center mb-6">
                    <div class="w-16 h-16 rounded-full border-4 border-cyan-500/20 border-t-cyan-500 animate-spin"></div>
                    <div class="w-8 h-8 rounded-full border-4 border-purple-500/20 border-t-purple-500 animate-spin absolute" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
                </div>
                <h3 class="font-extrabold text-base md:text-lg text-white tracking-wide animate-pulse">Menghubungkan Portal...</h3>
                <p class="text-xs text-slate-400 mt-2">Sila tunggu seketika semasa pelayan Google bersedia.</p>
            </div>

            <!-- IFRAME CONTAINER -->
            <!-- PENTING: Gantikan URL_WEB_APP_ANDA di bawah dengan URL Web App Apps Script anda yang sebenar -->
            <iframe 
                id="portalIframe"
                src="GANTIKAN_URL_WEB_APP_ANDA_DI_SINI" 
                class="w-full h-full flex-1 border-none rounded-2xl md:rounded-3xl"
                allow="geolocation; microphone; camera; midi; encrypted-media;"
                onload="iframeLoaded()">
            </iframe>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-3 text-center text-[10px] md:text-xs text-slate-500 z-10 relative">
        <p>© 2026 Portal Smart Task. Dihoskan secara selamat menggunakan Google Apps Script.</p>
    </footer>

    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        // Sembunyikan loading overlay sebaik sahaja iframe selesai dimuatkan
        function iframeLoaded() {
            const iframe = document.getElementById('portalIframe');
            const overlay = document.getElementById('loadingOverlay');
            
            // Hanya sembunyikan jika URL telah digantikan daripada placeholder lalai
            if (iframe.src.indexOf('https://script.google.com/macros/s/AKfycbxgkl5HD0IWbOU1a5fsU70bKaxoJ67-UcWxD3b0ZAhmxplhVpoGkJPJGcGbCZggcHa92g/exec') === -1) {
                iframe.classList.add('loaded');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            } else {
                // Jika masih menggunakan default placeholder, paparkan arahan
                overlay.innerHTML = `
                    <div class="p-6 text-center max-w-sm glass-card rounded-2xl border border-red-500/30">
                        <i data-lucide="alert-triangle" class="w-12 h-12 text-amber-500 mx-auto mb-4"></i>
                        <h3 class="text-base font-extrabold text-white">Konfigurasi Diperlukan</h3>
                        <p class="text-xs text-slate-300 mt-2 leading-relaxed">
                            Sila buka fail <code>site.html</code> dan gantikan <code>GANTIKAN_URL_WEB_APP_ANDA_DI_SINI</code> pada baris ke-107 dengan URL Web App Google Apps Script anda yang sebenar.
                        </p>
                    </div>
                `;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
