<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Task Tracker Pendidikan</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Warna latar belakang gelap yang sepadan */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        iframe.loaded {
            opacity: 1;
        }

        /* Loading Spinner */
        .loading-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            z-index: 10;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(14, 165, 233, 0.1);
            border-top: 4px solid #0ea5e9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 20px;
            color: #f8fafc;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Indikator Pemuatan (Loading) -->
    <div id="loader" class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">MEMUATKAN PORTAL...</div>
    </div>

    <!-- Iframe Penuh Skrin -->
    <iframe 
        id="appIframe"
        src="https://script.google.com/macros/s/AKfycbxgkl5HD0IWbOU1a5fsU70bKaxoJ67-UcWxD3b0ZAhmxplhVpoGkJPJGcGbCZggcHa92g/exec"
        onload="onIframeLoad()">
    </iframe>

    <script>
        // Sembunyikan loading spinner setelah iframe selesai dimuatkan sepenuhnya
        function onIframeLoad() {
            const loader = document.getElementById('loader');
            const iframe = document.getElementById('appIframe');
            
            iframe.classList.add('loaded');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.visibility = 'hidden';
            }, 500);
        }
    </script>
</body>
</html>
